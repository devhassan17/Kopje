<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard | Kopje Gooien</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff1493;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --bg-dark: #091211;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--primary-pink);
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.4);
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .tab {
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 10px;
            transition: 0.3s;
            opacity: 0.5;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab.active {
            opacity: 1;
            background: var(--primary-pink);
            color: white;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .stats-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            text-align: left;
            padding: 15px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
        }

        tr {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
        }

        td {
            padding: 20px 15px;
        }

        td:first-child { border-radius: 15px 0 0 15px; }
        td:last-child { border-radius: 0 15px 15px 0; }

        .email { font-weight: 700; color: #fff; }
        .name { color: rgba(255, 255, 255, 0.7); }
        .count { color: var(--primary-pink); font-weight: 900; font-size: 1rem; }
        .score { color: #fff; font-weight: 900; font-size: 1.3rem; }

        .config-form {
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 30px;
            max-width: 600px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary-pink);
            background: rgba(255,255,255,0.1);
        }

        .btn {
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 20, 147, 0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            margin-left: 10px;
        }

        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            padding: 50px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="config-form" style="text-align: center;">
            <h1 style="margin-bottom: 30px;">ADMIN LOGIN</h1>
            <input type="password" id="admin-pass" placeholder="Enter Password" style="text-align: center; font-size: 24px; letter-spacing: 5px; margin-bottom: 20px;">
            <button onclick="checkAuth()" class="btn" style="width: 100%;">ACCESS DASHBOARD</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>KOPJE ADMIN</h1>
            <button onclick="logout()" class="btn btn-secondary">LOGOUT</button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('stats')">User Statistics</div>
            <div class="tab" onclick="showTab('email')">Email Configuration</div>
        </div>

        <div id="stats-section" class="content-section active">
            <table class="stats-table">
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Name</th>
                        <th>Total Plays</th>
                        <th>Highest Score</th>
                    </tr>
                </thead>
                <tbody id="admin-data">
                    <tr><td colspan="4" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="email-section" class="content-section">
            <div class="config-form">
                <div class="input-group">
                    <label>SMTP Host</label>
                    <input type="text" id="smtp_host" placeholder="smtp.gmail.com">
                </div>
                <div class="input-group">
                    <label>SMTP Port</label>
                    <input type="text" id="smtp_port" placeholder="587">
                </div>
                <div class="input-group">
                    <label>SMTP User (Email)</label>
                    <input type="text" id="smtp_user" placeholder="your-email@gmail.com">
                </div>
                <div class="input-group">
                    <label>SMTP Password / App Password</label>
                    <input type="password" id="smtp_pass" placeholder="••••••••••••">
                </div>
                <div style="display: flex; gap: 15px;">
                    <button onclick="saveSettings()" class="btn">SAVE SETTINGS</button>
                    <button onclick="testEmail()" class="btn btn-secondary">SEND TEST EMAIL</button>
                </div>
                <p id="settings-status" style="margin-top: 20px; font-size: 0.9rem; opacity: 0.7;"></p>
            </div>
        </div>
    </div>

    <script>
        let adminPassword = '';

        function checkAuth() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === 'moyeeadmin') {
                adminPassword = pass;
                document.getElementById('login-overlay').style.display = 'none';
                loadStats();
                loadSettings();
            } else {
                alert('Invalid password');
            }
        }

        function logout() {
            window.location.reload();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabId + '-section').classList.add('active');
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/admin');
                const data = await res.json();
                const container = document.getElementById('admin-data');
                container.innerHTML = '';

                if (data.length === 0) {
                    container.innerHTML = '<tr><td colspan="4" class="loading">No registered users yet.</td></tr>';
                    return;
                }

                data.forEach(user => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="email">${user.email}</td>
                        <td class="name">${user.name}</td>
                        <td class="count">${user.total_plays}</td>
                        <td class="score">${user.highest_score}</td>
                    `;
                    container.appendChild(row);
                });
            } catch (e) {
                document.getElementById('admin-data').innerHTML = '<tr><td colspan="4" class="loading">Error loading stats.</td></tr>';
            }
        }

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                Object.keys(data).forEach(key => {
                    if (document.getElementById(key)) {
                        document.getElementById(key).value = data[key];
                    }
                });
            } catch (e) {
                console.error('Failed to load settings');
            }
        }

        async function saveSettings() {
            const status = document.getElementById('settings-status');
            status.innerText = 'Saving...';
            
            const settings = {
                smtp_host: document.getElementById('smtp_host').value,
                smtp_port: document.getElementById('smtp_port').value,
                smtp_user: document.getElementById('smtp_user').value,
                smtp_pass: document.getElementById('smtp_pass').value
            };

            try {
                const res = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ settings, password: adminPassword })
                });
                
                if (res.ok) {
                    status.style.color = '#4CAF50';
                    status.innerText = 'Settings saved successfully!';
                } else {
                    throw new Error('Failed to save');
                }
            } catch (e) {
                status.style.color = '#f44336';
                status.innerText = 'Error saving settings.';
            }
        }

        async function testEmail() {
            const email = prompt('Enter recipient email for test:');
            if (!email) return;

            const status = document.getElementById('settings-status');
            status.innerText = 'Sending test email...';

            try {
                const res = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, name: 'Admin Test', test: true })
                });
                
                const data = await res.json();
                if (res.ok) {
                    status.style.color = '#4CAF50';
                    status.innerText = 'Test email sent! Check your inbox.';
                } else {
                    throw new Error(data.error);
                }
            } catch (e) {
                status.style.color = '#f44336';
                status.innerText = 'Email test failed: ' + e.message;
            }
        }
    </script>
</body>
</html>
