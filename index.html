	<!-- Leaderboard & Submission Hook -->
	<a href="leaderboard.html" id="leaderboard-btn">GLOBAL LEADERBOARD</a>

	<div id="score-modal">
		<div class="modal-content">
			<h2>NEW HIGH SCORE!</h2>
			<p>Your Score: <span id="display-score">0</span></p>
			<input type="text" id="player-name" placeholder="Enter Your Nickname" maxlength="15">
			<br>
			<button onclick="submitGlobalScore()">SUBMIT SCORE</button>
			<button onclick="document.getElementById('score-modal').style.display = 'none'" style="background:transparent; border: 2px solid var(--primary-pink); margin-top: 10px;">SKIP</button>
		</div>
	</div>

	<script>
		let pendingScore = 0;
		window.showScoreModal = function(score) {
			pendingScore = score;
			document.getElementById('display-score').innerText = score;
			document.getElementById('score-modal').style.display = 'flex';
		};

		async function submitGlobalScore() {
			const name = document.getElementById('player-name').value.trim() || 'Anonymous';
			const button = document.querySelector('#score-modal button');
			button.innerText = 'SUBMITTING...';
			button.disabled = true;

			try {
				const res = await fetch('/api/scores', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ name, score: pendingScore })
				});
				if (res.ok) {
					window.location.href = 'leaderboard.html';
				} else {
					alert('Failed to submit score. Try again!');
					button.innerText = 'SUBMIT SCORE';
					button.disabled = false;
				}
			} catch (e) {
				console.error(e);
				alert('Network error. Check your connection.');
				button.innerText = 'SUBMIT SCORE';
				button.disabled = false;
			}
		}
	</script>
