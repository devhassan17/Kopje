	<!-- APICode2 -->


	<!-- END OF TEST -->

	<div id="score-modal">
		<div class="modal-content glass-morphism">
			<div class="opening-top-logos" style="margin-bottom: 30px;">
				<img src="media/graphics/opening/Moyee_Final_Logos.png" class="partner-logos" alt="Moyee Logo" style="height: 100px !important;">
			</div>
			<h2 class="premium-text" style="margin-top: 0;">NEW HIGH SCORE!</h2>
			<div class="score-display">
				<span class="score-label">Your Score:</span>
				<span id="display-score" class="score-value">0</span>
			</div>
			<div class="modal-buttons">
				<button onclick="submitGlobalScore()" class="submit-btn">SUBMIT SCORE</button>
				<button onclick="document.getElementById('score-modal').style.display = 'none'"
					class="skip-btn">SKIP</button>
			</div>
		</div>
	</div>



	<script>
		let pendingScore = 0;
		let verificationCode = "";

		window.showScoreModal = function (score) {
			pendingScore = score;
			document.getElementById('display-score').innerText = score;
			document.getElementById('score-modal').style.display = 'flex';
			
			// Save locally too for immediate history
			const localScores = JSON.parse(localStorage.getItem('kopje_scores') || '[]');
			localScores.push({ score, date: new Date().toISOString() });
			localScores.sort((a, b) => b.score - a.score);
			localStorage.setItem('kopje_scores', JSON.stringify(localScores.slice(0, 5)));
			updateHistoryUI();
		};

		function updateHistoryUI() {
			const localScores = JSON.parse(localStorage.getItem('kopje_scores') || '[]');
			const container = document.getElementById('history-list');
			const historyBox = document.getElementById('user-history');
			
			if (localScores.length > 0) {
				historyBox.style.display = 'block';
				container.innerHTML = localScores.map(s => `
					<div style="background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;">
						<span style="color: white; font-weight: 700; font-size: 18px;">${s.score} <small style="font-weight: 400; opacity: 0.5;">pts</small></span>
						<span style="color: rgba(255,255,255,0.4); font-size: 11px;">${new Date(s.date).toLocaleDateString()}</span>
					</div>
				`).join('');
			}
		}

		async function submitGlobalScore() {
			const name = localStorage.getItem('kopje_user_name') || 'Anonymous';
			const email = localStorage.getItem('kopje_user_email') || '';
			const button = document.querySelector('.submit-btn');
			button.innerText = 'SUBMITTING...';
			button.disabled = true;

			const scoreData = { name, email, score: pendingScore, date: new Date().toISOString() };

			try {
				const res = await fetch('/api/scores', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(scoreData)
				});

				if (res.ok) {
					window.location.href = 'leaderboard.html';
					return;
				}
				throw new Error('Server submission failed');
			} catch (e) {
				console.warn('Network error, score saved locally');
				window.location.href = 'leaderboard.html';
			}
		}

		window.checkRegistration = function () {
			const email = localStorage.getItem('kopje_user_email');
			const verified = localStorage.getItem('kopje_user_verified');
			
			if (email && verified) {
				if (ig.game && ig.game.pressPlay) ig.game.pressPlay();
				if (ig.soundHandler && ig.soundHandler.staticSound) ig.soundHandler.staticSound.play();
			} else {
				document.getElementById('registration-modal').style.display = 'flex';
				resetReg();
			}
		};

		window.sendVerificationCode = function() {
			const name = document.getElementById('reg-name').value.trim();
			const email = document.getElementById('reg-email').value.trim();

			if (!name || !email || !email.includes('@')) {
				alert('Please enter a valid name and email address.');
				return;
			}

			// Simulation of sending email
			verificationCode = Math.floor(1000 + Math.random() * 9000).toString();
			alert("VERIFICATION CODE: " + verificationCode + "\n\n(In a production environment, this would be sent to your email)");
			
			localStorage.setItem('kopje_user_name', name);
			localStorage.setItem('kopje_user_email', email);
			
			document.getElementById('reg-step-1').style.display = 'none';
			document.getElementById('reg-step-2').style.display = 'block';
		};

		window.verifyAndSubmit = function() {
			const inputCode = document.getElementById('reg-code').value.trim();
			if (inputCode === verificationCode) {
				localStorage.setItem('kopje_user_verified', 'true');
				
				document.getElementById('registration-modal').style.display = 'none';
				document.getElementById('play').classList.remove('overlay-visible');

				if (ig.game && ig.game.pressPlay) ig.game.pressPlay();
				if (ig.soundHandler && ig.soundHandler.staticSound) ig.soundHandler.staticSound.play();
			} else {
				alert('Invalid verification code. Please try again.');
			}
		};

		window.resetReg = function() {
			document.getElementById('reg-step-1').style.display = 'block';
			document.getElementById('reg-step-2').style.display = 'none';
			document.getElementById('reg-code').value = '';
		};

		window.startActualGame = function () {
			document.getElementById('post-lid-menu').classList.remove('overlay-visible');
			if (ig.game && ig.game.director) {
				if(ig.game.resumeGame) ig.game.resumeGame();
				ig.game.director.jumpTo(LevelLevel01);
				ig.system.context.globalAlpha = 1;
			}
		};

		window.showHighscores = function () {
			document.getElementById('post-lid-menu').classList.remove('overlay-visible');
			if (ig.game && ig.game.director) {
				if(ig.game.resumeGame) ig.game.resumeGame();
				ig.game.director.jumpTo(LevelLevelHighscore);
				ig.system.context.globalAlpha = 1;
			}
		};

		// Initial load
		updateHistoryUI();
	</script>

	<!-- Service Worker Disabled for Cache Stability -->
	<script>
		if ('serviceWorker' in navigator) {
			navigator.serviceWorker.getRegistrations().then(regs => {
				for (let reg of regs) reg.unregister();
			});
		}
	</script>
